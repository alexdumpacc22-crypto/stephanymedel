<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stephany Medel <3</title>
  </head>
  <style>
    h2 {
  font-size: 2rem;
  font-family: "Lucida Sans", "Lucida Sans Regular", "Lucida Grande",
    "Lucida Sans Unicode", Geneva, Verdana, sans-serif;
  color: rgb(65, 20, 37);
  text-shadow: -2px 1px 10px rgb(255, 180, 193);
  position: absolute;
  z-index: 100;
  left: 34%;
  top: 50%;
  opacity: 0.9;
}
.back {
  background-image: url('girl1.png');
  position: fixed;
  padding: 0;
  margin: 0;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  animation-name: back;
  animation-duration: 7s;
  animation-iteration-count: infinite;
}
.love {
  position: absolute;
  background-color: rgb(207, 105, 112);
  width: 250px;
  height: 250px;
  margin: auto;
  top: 0;
  left: 0;
  bottom: 0;
  right: 0;
  transform: rotate(-45deg);
  animation-name: love;
  animation-duration: 3s;
  animation-delay: 1s;
  animation-iteration-count: infinite;
}
.love::before {
  content: "";
  position: absolute;
  background-color: rgb(207, 105, 112);
  border-radius: 50%;
  width: 250px;
  height: 250px;
  top: -125px;
  left: 0px;
}
.love::after {
  content: "";
  position: absolute;
  background-color: rgb(207, 105, 112);
  border-radius: 50%;
  width: 250px;
  height: 250px;
  left: 125px;
  top: 0px;
}

@keyframes back {
  50% {
    background: rgb(250, 211, 214);
  }
}
@keyframes love {
  50% {
    transform: scale(0.3) rotate(-45deg);
  }
}
/*love-1*/
.love-1 {
  position: absolute;
  background-color: rgb(231, 132, 139);
  width: 125px;
  height: 125px;
  margin: auto;
  top: 0;
  left: 0;
  bottom: 0;
  right: 0;
  transform: rotate(-45deg);
  animation-name: love-1;
  animation-duration: 2s;
  animation-delay: 1.7s;
  animation-iteration-count: infinite;
}
.love-1::before {
  content: "";
  position: absolute;
  background-color: rgb(231, 132, 139);
  border-radius: 50%;
  width: 125px;
  height: 125px;
  top: -62.5px;
  left: 0px;
}
.love-1::after {
  content: "";
  position: absolute;
  background-color: rgb(231, 132, 139);
  border-radius: 50%;
  width: 125px;
  height: 125px;
  left: 62.5px;
  top: 0px;
}

@keyframes love-1 {
  50% {
    transform: scale(0.5) rotate(-45deg);
  }
}
/*love-2*/
.love-2 {
  position: absolute;
  background-color: pink;
  width: 62.5px;
  height: 62.5px;
  margin: auto;
  top: 0;
  left: 0;
  bottom: 0;
  right: 0;
  transform: rotate(-45deg);
  animation-name: love-2;
  animation-duration: 1s;
  animation-delay: 1s;
  animation-iteration-count: infinite;
}
.love-2::before {
  content: "";
  position: absolute;
  background-color: pink;
  border-radius: 50%;
  width: 62.5px;
  height: 62.5px;
  top: -31.25px;
  left: 0px;
}
.love-2::after {
  content: "";
  position: absolute;
  background-color: pink;
  border-radius: 50%;
  width: 62.5px;
  height: 62.5px;
  left: 31.25px;
  top: 0px;
}

@keyframes love-2 {
  50% {
    transform: scale(1.25) rotate(-45deg);
  }
}

  </style>
  <body>
    <h2>My heart when i see you!</h2>
    <!-- for more code, visit my tiktok account -->
    <!-- tiktok "meowish" -->
    <div class="back"></div>
    <div class="love"></div>
    <div class="love-1"></div>
    <div class="love-2"></div>
  </body>
</html>
